<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olá Mundo Estilizado</title>
    <style>
        /* O CSS começa aqui */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background-color: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        h1 {
            color: #2563eb;
            margin-bottom: 10px;
        }

        p {
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Olá, Mundo! 🚀</h1>
        <p>Este é o meu primeiro código com estilo CSS.</p>
    </div>

</body>
</html>
