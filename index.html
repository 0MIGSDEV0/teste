<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buraco Negro Neon com Chuva de Meteoros</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #050505; /* Fundo breu cósmico */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* Fundo de meteoros neon (chuva intensa) */
        .meteors {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: -2; /* Atrás de tudo */
        }

        .meteor {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #ff00ff; /* Pink neon forte */
            border-radius: 50%;
            box-shadow: 
                0 0 12px #ff00ff,
                0 0 35px #a855f7,
                0 0 70px #7b2ff7;
            opacity: 0;
            animation: fall linear infinite;
        }

        /* Variações para parecer aleatório (mais meteoros = mais denso) */
        .meteor:nth-child(1)  { left: 5%;  animation-duration: 5s;  animation-delay: 0s; }
        .meteor:nth-child(2)  { left: 15%; animation-duration: 7s;  animation-delay: 0.8s; width: 5px; height: 5px; }
        .meteor:nth-child(3)  { left: 25%; animation-duration: 6s;  animation-delay: 1.5s; }
        .meteor:nth-child(4)  { left: 35%; animation-duration: 8s;  animation-delay: 2.2s; box-shadow: 0 0 50px #c084fc; }
        .meteor:nth-child(5)  { left: 45%; animation-duration: 4.5s; animation-delay: 3s; }
        .meteor:nth-child(6)  { left: 55%; animation-duration: 9s;  animation-delay: 0.5s; width: 4px; height: 4px; }
        .meteor:nth-child(7)  { left: 65%; animation-duration: 6.5s; animation-delay: 4s; }
        .meteor:nth-child(8)  { left: 75%; animation-duration: 7.5s; animation-delay: 1.2s; opacity: 0.8; }
        .meteor:nth-child(9)  { left: 85%; animation-duration: 5.5s; animation-delay: 2.8s; }
        .meteor:nth-child(10) { left: 10%; animation-duration: 10s; animation-delay: 3.5s; width: 6px; height: 6px; }
        .meteor:nth-child(11) { left: 30%; animation-duration: 6s;  animation-delay: 5s; }
        .meteor:nth-child(12) { left: 50%; animation-duration: 8s;  animation-delay: 1.8s; }
        .meteor:nth-child(13) { left: 70%; animation-duration: 7s;  animation-delay: 4.5s; }
        .meteor:nth-child(14) { left: 90%; animation-duration: 5s;  animation-delay: 0.3s; }

        @keyframes fall {
            0% {
                top: -10%;
                transform: translateX(0) rotate(35deg);
                opacity: 0;
            }
            10% { opacity: 1; }
            100% {
                top: 120%;
                transform: translateX(-120px) rotate(35deg); /* diagonal pra esquerda */
                opacity: 0;
            }
        }

        /* Buraco Negro Pulsante */
        .black-hole {
            position: absolute;
            width: 180px;
            height: 180px;
            background: black;
            border-radius: 50%;
            z-index: -1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow:
                0 0 30px #7b2ff7,
                0 0 70px #3b0764,
                0 0 140px #7b2ff7,
                inset 0 0 40px #000;
            animation: pulsar 5s infinite ease-in-out, girar 12s linear infinite;
        }

        @keyframes pulsar {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.85; }
            50%      { transform: translate(-50%, -50%) scale(1.25); opacity: 1; }
        }

        @keyframes girar {
            from { filter: hue-rotate(0deg); }
            to   { filter: hue-rotate(360deg); }
        }

        /* Card Neon */
        .card {
            background-color: #000;
            padding: 60px 40px;
            border-radius: 25px;
            text-align: center;
            position: relative;
            z-index: 1;
            max-width: 420px;
            border: 3px solid #a855f7;
            box-shadow: 0 0 25px #a855f7, inset 0 0 15px #a855f7;
        }

        h1 {
            color: #fff;
            font-size: 3rem;
            margin: 0 0 15px;
            text-shadow: 0 0 15px #a855f7, 0 0 30px #7b2ff7;
        }

        p {
            color: #d8b4fe;
            font-size: 1.3rem;
            margin: 0 0 30px;
        }

        button {
            background: transparent;
            color: #fff;
            border: 2px solid #a855f7;
            padding: 14px 40px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.4s;
            box-shadow: 0 0 15px #a855f7;
        }

        button:hover {
            background: #a855f7;
            box-shadow: 0 0 40px #a855f7;
            color: #000;
            transform: scale(1.08);
        }
    </style>
</head>
<body>
    <!-- Chuva de meteoros -->
    <div class="meteors">
        <div class="meteor"></div><div class="meteor"></div><div class="meteor"></div>
        <div class="meteor"></div><div class="meteor"></div><div class="meteor"></div>
        <div class="meteor"></div><div class="meteor"></div><div class="meteor"></div>
        <div class="meteor"></div><div class="meteor"></div><div class="meteor"></div>
        <div class="meteor"></div><div class="meteor"></div>
    </div>

    <div class="card">
        <div class="black-hole"></div>
        <h1>Olá, Mundo!</h1>
        <p>Bem-vindo ao centro da galáxia neon.</p>
        <button onclick="mudar()">Explorar</button>
    </div>

    <script>
        function mudar() {
            alert("Você entrou na zona gravitacional!");
        }
    </script>
</body>
</html>
